name: Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 代码检查
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Run clippy
        run: cargo clippy -- -D warnings

  # 测试
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      
      - name: Run tests
        run: cargo test --release

  # 构建并上传 artifacts
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
            name: windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            name: linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            name: macos-x64
          - os: macos-14
            target: aarch64-apple-darwin
            suffix: ""
            name: macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Debug - List files
        shell: bash
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== target directory ==="
          ls -la target/ || true
          echo "=== target/${{ matrix.target }}/release ==="
          ls -la target/${{ matrix.target }}/release/ || true

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv jidobao${{ matrix.suffix }} jidobao-${{ matrix.name }}${{ matrix.suffix }}
          else
            mv jidobao${{ matrix.suffix }} jidobao-${{ matrix.name }}${{ matrix.suffix }}
            chmod +x jidobao-${{ matrix.name }}${{ matrix.suffix }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jidobao-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/jidobao-${{ matrix.name }}${{ matrix.suffix }}

  # 发布到 Release
  release:
    needs: [check, test, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          name: 记多宝 ${{ github.ref_name }}
          body: |
            ## 记多宝 (Jidobao) ${{ github.ref_name }}
            
            安全的本地密码管理工具
            
            ### 下载
            
            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Windows | x64 | `jidobao-windows-x64.exe` |
            | Linux | x64 | `jidobao-linux-x64` |
            | macOS | x64 | `jidobao-macos-x64` |
            | macOS | ARM64 | `jidobao-macos-arm64` |
            
            ### 使用说明
            
            **Windows:**
            ```powershell
            jidobao-windows-x64.exe
            ```
            
            **Linux / macOS:**
            ```bash
            chmod +x jidobao-*
            ./jidobao-linux-x64
            ```
            
            ### 功能特点
            - 🎨 酷炫 TUI 界面
            - 🔐 AES-256-GCM 加密
            - 📋 剪贴板支持
            - 🔍 密码搜索
            - 📤 CSV 导出
            
            ### 作者
            - 赵无为
            - 邮箱: cherishtong@aliyun.com
            - QQ: 1427730623
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
